name: 🤖 Convis Bot Automation

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

on:
  schedule:
    # Visit Checker: Every Friday 4pm São Paulo time (7pm UTC)
    - cron: "0 19 * * 5"
  workflow_dispatch:

jobs:
  visit_checker:
    name: 📅 Visit Availability Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install --no-cache-dir -r scraper/requirements.txt

      - name: 🏃‍♂️ Run Visit Checker
        env:
          TARGET_SECTOR: ${{ secrets.TARGET_SECTOR }}
          TARGET_CELL: ${{ secrets.TARGET_CELL }}
        run: python scraper/visit_checker.py
